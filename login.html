<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hy.Financeiro — Acesso</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0a;--bg2:#111111;--bg3:#181818;--border:#2a2a2a;--orange:#f97316;--text:#f0f0f0;--text3:#606060;--green:#22c55e;--red:#ef4444;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(249,115,22,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(249,115,22,.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:48px 44px;width:min(420px,92vw);text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.5);position:relative;}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--orange),transparent);border-radius:16px 16px 0 0;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:5px;line-height:1;margin-bottom:8px;}
  .logo span{color:var(--orange);}
  .subtitle{color:var(--text3);font-size:12px;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:40px;}
  .form-group{text-align:left;margin-bottom:14px;}
  label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:7px;}
  input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:11px 14px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
  input:focus{border-color:var(--orange);}
  input::placeholder{color:var(--text3);}
  .btn{width:100%;background:var(--orange);color:#000;border:none;border-radius:10px;padding:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn:hover{background:#fb923c;transform:translateY(-1px);}
  .btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
  .msg{border-radius:8px;padding:10px 14px;font-size:13px;margin-top:12px;display:none;}
  .msg.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);}
  .sp{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:sp .6s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .footer{margin-top:28px;color:var(--text3);font-size:11px;line-height:1.6;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">HY<span>.</span>FINANCEIRO</div>
  <div class="subtitle">Acesso ao Sistema</div>
  <div class="form-group">
    <label>E-mail</label>
    <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Senha</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <button class="btn" id="btn" onclick="doLogin()">Acessar Sistema</button>
  <div class="msg error" id="msg"></div>
  <div class="footer">Acesso restrito.<br>Solicite credenciais ao administrador.</div>
</div>

<script>
  var BIN_ID  = '69e28a7536566621a8c4e506';
  var BIN_KEY = '$2a$10$urWQlKlssQEtEaHNSWa.eOp1qGKKEIbd/t3rvP/EIjol4H6c6aykG';
  var ADMIN   = 'rayannef025@gmail.com';
  var TIMEOUT = 15 * 60 * 1000;

  // Se já tem sessão válida, vai direto pro dashboard
  try {
    var s = JSON.parse(localStorage.getItem('cd_session'));
    if (s && s.email && s.exp > Date.now()) {
      window.location.replace('/dashboard.html');
    }
  } catch(e){}

  async function sha256(str) {
    var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function getUsers() {
    var cached = localStorage.getItem('cd_users_cache');
    var cacheTime = parseInt(localStorage.getItem('cd_users_cache_time') || '0');
    if (cached && (Date.now() - cacheTime) < 300000) {
      return JSON.parse(cached);
    }
    try {
      var r = await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest', {
        headers: {'X-Master-Key': BIN_KEY}
      });
      if (!r.ok) throw new Error('fetch failed');
      var d = await r.json();
      var users = d.record || {};
      localStorage.setItem('cd_users_cache', JSON.stringify(users));
      localStorage.setItem('cd_users_cache_time', Date.now().toString());
      return users;
    } catch(e) {
      if (cached) return JSON.parse(cached);
      return {};
    }
  }

  async function doLogin() {
    var email    = (document.getElementById('email').value || '').trim().toLowerCase();
    var password = document.getElementById('password').value || '';
    var btn      = document.getElementById('btn');
    var msgEl    = document.getElementById('msg');
    msgEl.style.display = 'none';

    if (!email || !password) { showErr('Preencha e-mail e senha.'); return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="sp"></span> Verificando...';

    try {
      var hash  = await sha256(password);
      var users = await getUsers();
      var user  = users[email];

      if (!user) { fail(); return; }
      if (user.status === 'disabled') {
        showErr('✕ Acesso desativado. Contate o administrador.');
        reset(); return;
      }
      if (user.hash !== hash) { fail(); return; }

      // Login OK — cria sessão com expiração
      var session = {
        email: email,
        name:  user.name || email,
        role:  user.role  || 'user',
        exp:   Date.now() + TIMEOUT
      };
      localStorage.setItem('cd_session', JSON.stringify(session));
      window.location.replace('/dashboard.html');

    } catch(e) {
      showErr('✕ Erro ao conectar. Tente novamente.');
      reset();
    }
  }

  function fail()  { showErr('✕ E-mail ou senha incorretos.'); reset(); }
  function reset() {
    var btn = document.getElementById('btn');
    btn.disabled = false;
    btn.innerHTML = 'Acessar Sistema';
  }
  function showErr(t) {
    var m = document.getElementById('msg');
    m.textContent = t;
    m.style.display = 'block';
  }
</script>
</body>
</html>
