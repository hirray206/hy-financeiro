<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CréditoDash — Usuários</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0a;--bg2:#111;--bg3:#181818;--border:#2a2a2a;--orange:#f97316;--text:#f0f0f0;--text2:#a0a0a0;--text3:#606060;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:32px 24px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px;flex-wrap:wrap;gap:16px;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;}
  .logo span{color:var(--orange);}
  .back-btn{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;}
  .back-btn:hover{border-color:var(--orange);color:var(--orange);}
  h1{font-size:22px;font-weight:700;margin-bottom:6px;}
  .sub{color:var(--text3);font-size:13px;margin-bottom:32px;}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:28px;margin-bottom:24px;}
  .card h2{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:20px;}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:12px;align-items:end;}
  .field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:7px;}
  input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 14px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
  input:focus{border-color:var(--orange);}
  input::placeholder{color:var(--text3);}
  .btn{background:var(--orange);color:#000;border:none;border-radius:8px;padding:10px 20px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .2s;}
  .btn:hover{background:#fb923c;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn.sm{padding:6px 12px;font-size:12px;}
  .btn.danger{background:transparent;border:1px solid var(--red);color:var(--red);}
  .btn.danger:hover{background:var(--red);color:#fff;}
  .btn.success{background:transparent;border:1px solid var(--green);color:var(--green);}
  .btn.success:hover{background:var(--green);color:#000;}
  .msg{border-radius:8px;padding:10px 14px;font-size:13px;margin-top:12px;display:none;}
  .msg.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--green);}
  .msg.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);padding:0 0 12px;border-bottom:1px solid var(--border);}
  td{padding:14px 8px 14px 0;border-bottom:1px solid #1a1a1a;font-size:14px;vertical-align:middle;}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
  .badge.active{background:rgba(34,197,94,.15);color:var(--green);}
  .badge.disabled{background:rgba(239,68,68,.15);color:var(--red);}
  .badge.admin{background:rgba(249,115,22,.15);color:var(--orange);}
  .actions{display:flex;gap:6px;flex-wrap:wrap;}
  .sp{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;}
  @keyframes sp{to{transform:rotate(360deg);}}
  @media(max-width:640px){.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">CRÉDITO<span>.</span>DASH</div>
  <button class="back-btn" onclick="window.location.href='/dashboard.html'">← Voltar</button>
</div>
<h1>Gerenciar Usuários</h1>
<p class="sub">Apenas você (admin) tem acesso a esta página.</p>

<div class="card">
  <h2>➕ Adicionar usuário</h2>
  <div class="grid">
    <div class="field"><label>Nome</label><input type="text" id="new-name" placeholder="Nome completo"></div>
    <div class="field"><label>E-mail</label><input type="email" id="new-email" placeholder="usuario@email.com"></div>
    <div class="field"><label>Senha</label><input type="password" id="new-pass" placeholder="Mínimo 6 caracteres"></div>
    <button class="btn" id="add-btn" onclick="addUser()">Adicionar</button>
  </div>
  <div class="msg" id="add-msg"></div>
</div>

<div class="card">
  <h2>👥 Usuários cadastrados</h2>
  <div id="loading" style="color:var(--text3);font-size:14px;padding:20px 0;">Carregando...</div>
  <table id="user-table" style="display:none">
    <thead><tr><th>Nome</th><th>E-mail</th><th>Status</th><th>Ações</th></tr></thead>
    <tbody id="user-tbody"></tbody>
  </table>
</div>

<script>
  // ── CONFIGURAÇÃO ──────────────────────────────────────────────
  var BIN_ID  = '69e28a7536566621a8c4e506';
  var BIN_KEY = '$2a$10$urWQlKlssQEtEaHNSWa.eOp1qGKKEIbd/t3rvP/EIjol4H6c6aykG';
  var ADMIN   = 'rayannef025@gmail.com';
  // ─────────────────────────────────────────────────────────────

  var session = null;
  try { session = JSON.parse(localStorage.getItem('cd_session')); } catch(e){}
  if (!session || session.email !== ADMIN || session.exp < Date.now()) {
    window.location.replace('/login.html');
  }

  async function sha256(str) {
    var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function getUsers() {
    var r = await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest', {
      headers: {'X-Master-Key': BIN_KEY}
    });
    var d = await r.json();
    return d.record;
  }

  async function saveUsers(users) {
    var r = await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json', 'X-Master-Key': BIN_KEY},
      body: JSON.stringify(users)
    });
    if (!r.ok) throw new Error('Erro ao salvar');
    // Atualiza cache
    localStorage.setItem('cd_users_cache', JSON.stringify(users));
    localStorage.setItem('cd_users_cache_time', Date.now().toString());
    return r.json();
  }

  function showMsg(id, text, type) {
    var el = document.getElementById(id);
    el.textContent = text; el.className = 'msg ' + type; el.style.display = 'block';
    if (type === 'ok') setTimeout(function(){ el.style.display='none'; }, 4000);
  }

  async function addUser() {
    var name  = document.getElementById('new-name').value.trim();
    var email = document.getElementById('new-email').value.trim().toLowerCase();
    var pass  = document.getElementById('new-pass').value;
    if (!name || !email || !pass) { showMsg('add-msg','Preencha todos os campos.','err'); return; }
    if (pass.length < 6) { showMsg('add-msg','Senha mínimo 6 caracteres.','err'); return; }
    var btn = document.getElementById('add-btn');
    btn.disabled = true; btn.innerHTML = '<span class="sp"></span>';
    try {
      var users = await getUsers();
      if (users[email] && email !== ADMIN) { showMsg('add-msg','E-mail já cadastrado.','err'); btn.disabled=false; btn.innerHTML='Adicionar'; return; }
      users[email] = {name: name, hash: await sha256(pass), status: 'active', role: 'user'};
      await saveUsers(users);
      showMsg('add-msg', '✓ Usuário "' + name + '" adicionado!', 'ok');
      document.getElementById('new-name').value = '';
      document.getElementById('new-email').value = '';
      document.getElementById('new-pass').value = '';
      renderUsers(users);
    } catch(e) { showMsg('add-msg', '✕ Erro: ' + e.message, 'err'); }
    btn.disabled = false; btn.innerHTML = 'Adicionar';
  }

  async function loadUsers() {
    try {
      var users = await getUsers();
      renderUsers(users);
    } catch(e) {
      document.getElementById('loading').textContent = 'Erro ao carregar usuários.';
    }
  }

  function renderUsers(users) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('user-table').style.display = 'table';
    var tbody = document.getElementById('user-tbody');
    tbody.innerHTML = '';
    Object.keys(users).forEach(function(email) {
      var u = users[email];
      var isAdmin = email === ADMIN;
      var badge = isAdmin ? '<span class="badge admin">Admin</span>'
        : u.status === 'active' ? '<span class="badge active">Ativo</span>'
        : '<span class="badge disabled">Desativado</span>';
      var actions = isAdmin ? '<span style="color:var(--text3);font-size:12px;">Conta master</span>'
        : '<div class="actions">'
        + '<button class="btn sm" onclick="changePass(\'' + email + '\')">🔑 Senha</button>'
        + (u.status === 'active'
            ? '<button class="btn sm danger" onclick="toggleUser(\'' + email + '\',\'disabled\')">⛔ Desativar</button>'
            : '<button class="btn sm success" onclick="toggleUser(\'' + email + '\',\'active\')">✓ Ativar</button>')
        + '<button class="btn sm danger" onclick="deleteUser(\'' + email + '\')">🗑</button>'
        + '</div>';
      var tr = document.createElement('tr');
      tr.innerHTML = '<td><strong>' + (u.name||'—') + '</strong></td>'
        + '<td style="color:var(--text2)">' + email + '</td>'
        + '<td>' + badge + '</td>'
        + '<td>' + actions + '</td>';
      tbody.appendChild(tr);
    });
  }

  async function changePass(email) {
    var pass = prompt('Nova senha para ' + email + ':');
    if (!pass || pass.length < 6) { alert('Mínimo 6 caracteres.'); return; }
    try {
      var users = await getUsers();
      users[email].hash = await sha256(pass);
      await saveUsers(users);
      alert('✓ Senha alterada!');
      renderUsers(users);
    } catch(e) { alert('Erro: ' + e.message); }
  }

  async function toggleUser(email, status) {
    try {
      var users = await getUsers();
      users[email].status = status;
      await saveUsers(users);
      renderUsers(users);
    } catch(e) { alert('Erro: ' + e.message); }
  }

  async function deleteUser(email) {
    if (!confirm('Remover "' + email + '"?')) return;
    try {
      var users = await getUsers();
      delete users[email];
      await saveUsers(users);
      renderUsers(users);
    } catch(e) { alert('Erro: ' + e.message); }
  }

  loadUsers();
</script>
</body>
</html>
